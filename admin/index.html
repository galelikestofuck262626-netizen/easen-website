<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>EASEN 产品管理后台</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,system-ui,sans-serif;background:#f5f5f5;color:#333}
.header{background:#1a365d;color:#fff;padding:16px 24px;display:flex;align-items:center;gap:12px}
.header h1{font-size:18px;font-weight:600}
.container{max-width:900px;margin:24px auto;padding:0 16px}
.card{background:#fff;border-radius:12px;padding:24px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.card h2{font-size:16px;font-weight:600;color:#1a365d;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #f0f0f0}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group.full{grid-column:1/-1}
label{font-size:13px;font-weight:500;color:#555}
input,select,textarea{padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none;transition:border 0.2s}
input:focus,select:focus,textarea:focus{border-color:#1a365d}
textarea{resize:vertical;min-height:80px}
.img-upload-area{border:2px dashed #ddd;border-radius:8px;padding:20px;text-align:center;cursor:pointer;transition:border 0.2s;position:relative}
.img-upload-area:hover{border-color:#c8a45c}
.img-upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.img-upload-area p{color:#888;font-size:13px}
.preview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-top:10px}
.preview-item{position:relative;aspect-ratio:1;border-radius:6px;overflow:hidden;background:#f5f5f5}
.preview-item img{width:100%;height:100%;object-fit:cover}
.preview-item .del{position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.5);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.btn{padding:11px 24px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s}
.btn-primary{background:#1a365d;color:#fff}
.btn-primary:hover{background:#2d4a7a}
.btn-primary:disabled{background:#999;cursor:not-allowed}
.btn-secondary{background:#f0f0f0;color:#333}
.status{padding:12px 16px;border-radius:8px;font-size:13px;margin-top:12px;display:none}
.status.success{background:#d4edda;color:#155724;display:block}
.status.error{background:#f8d7da;color:#721c24;display:block}
.status.loading{background:#d1ecf1;color:#0c5460;display:block}
.product-list{display:grid;gap:10px}
.product-item{display:flex;align-items:center;gap:12px;padding:12px;background:#f9f9f9;border-radius:8px;border:1px solid #eee}
.product-item img{width:60px;height:60px;object-fit:cover;border-radius:6px}
.product-info{flex:1}
.product-info h3{font-size:14px;font-weight:600}
.product-info p{font-size:12px;color:#888;margin-top:2px}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;background:#e8f0fe;color:#1a365d}
.tabs{display:flex;gap:4px;margin-bottom:20px}
.tab{padding:8px 20px;border:none;border-radius:8px;font-size:14px;cursor:pointer;background:#fff;color:#666;font-weight:500}
.tab.active{background:#1a365d;color:#fff}
.section{display:none}
.section.active{display:block}
@media(max-width:600px){.form-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="header">
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
  <h1>EASEN 产品管理后台</h1>
</div>

<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="showSection('add')">➕ 添加产品</button>
    <button class="tab" onclick="showSection('list')">📋 产品列表</button>
  </div>

  <!-- 添加产品 -->
  <div id="sec-add" class="section active">
    <div class="card">
      <h2>添加新产品</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>产品名称（中文）*</label>
          <input type="text" id="title_zh" placeholder="例如：现代简约餐椅"/>
        </div>
        <div class="form-group">
          <label>Product Name (English)</label>
          <input type="text" id="title_en" placeholder="e.g. Modern Dining Chair"/>
        </div>
        <div class="form-group">
          <label>产品类别 *</label>
          <select id="category">
            <option value="restaurant">餐厅家具</option>
            <option value="hotel">酒店家具</option>
            <option value="cafe">咖啡厅家具</option>
            <option value="outdoor">户外家具</option>
          </select>
        </div>
        <div class="form-group">
          <label>尺寸</label>
          <input type="text" id="dimensions" placeholder="例如：45x45x80cm"/>
        </div>
        <div class="form-group">
          <label>材料</label>
          <input type="text" id="material" placeholder="例如：实木、金属"/>
        </div>
        <div class="form-group">
          <label>面料</label>
          <input type="text" id="fabric" placeholder="例如：PU皮、布艺"/>
        </div>
        <div class="form-group">
          <label>颜色</label>
          <input type="text" id="color" placeholder="例如：黑色、棕色、多色可选"/>
        </div>
        <div class="form-group">
          <label>货号/型号</label>
          <input type="text" id="sku" placeholder="例如：ES-001"/>
        </div>
        <div class="form-group full">
          <label>产品描述（中文）</label>
          <textarea id="desc_zh" placeholder="产品特点、适用场景等..."></textarea>
        </div>
        <div class="form-group full">
          <label>Product Description (English)</label>
          <textarea id="desc_en" placeholder="Product features, suitable occasions..."></textarea>
        </div>
        <div class="form-group full">
          <label>上传产品图片（可多选）</label>
          <div class="img-upload-area" id="uploadArea">
            <input type="file" id="imgInput" accept="image/*" multiple onchange="handleImages(this)"/>
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5" style="margin:0 auto 8px"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <p>点击或拖拽上传图片</p>
            <p style="font-size:11px;color:#bbb;margin-top:4px">支持 JPG、PNG，可同时选择多张</p>
          </div>
          <div class="preview-grid" id="previewGrid"></div>
        </div>
      </div>
      <div style="margin-top:20px;display:flex;gap:10px;align-items:center">
        <button class="btn btn-primary" id="submitBtn" onclick="submitProduct()">✅ 保存并发布产品</button>
        <button class="btn btn-secondary" onclick="resetForm()">🔄 清空重填</button>
      </div>
      <div class="status" id="status"></div>
    </div>
  </div>

  <!-- 产品列表 -->
  <div id="sec-list" class="section">
    <div class="card">
      <h2>已发布产品</h2>
      <div id="productList"><p style="color:#888;font-size:14px">加载中...</p></div>
    </div>
  </div>
</div>

<script>
const GITHUB_TOKEN = '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';
const REPO = 'galelikestofuck262626-netizen/easen-website';
const BRANCH = 'main';

let selectedImages = [];

function showSection(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('sec-' + name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'list') loadProducts();
}

function handleImages(input) {
  const files = Array.from(input.files);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      selectedImages.push({ file, dataUrl: e.target.result, name: file.name });
      renderPreviews();
    };
    reader.readAsDataURL(file);
  });
}

function renderPreviews() {
  const grid = document.getElementById('previewGrid');
  grid.innerHTML = selectedImages.map((img, i) => `
    <div class="preview-item">
      <img src="${img.dataUrl}"/>
      <button class="del" onclick="removeImage(${i})">✕</button>
    </div>
  `).join('');
}

function removeImage(i) {
  selectedImages.splice(i, 1);
  renderPreviews();
}

function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + type;
}

async function uploadImageToGitHub(dataUrl, filename) {
  const base64 = dataUrl.split(',')[1];
  const path = `images/products/uploads/${Date.now()}-${filename}`;
  const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
    method: 'PUT',
    headers: {
      'Authorization': `token ${GITHUB_TOKEN}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      message: `Upload product image: ${filename}`,
      content: base64,
      branch: BRANCH
    })
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.message);
  return '/' + path;
}

async function submitProduct() {
  const title_zh = document.getElementById('title_zh').value.trim();
  const category = document.getElementById('category').value;
  if (!title_zh) { setStatus('请填写产品名称', 'error'); return; }
  if (selectedImages.length === 0) { setStatus('请至少上传一张产品图片', 'error'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  setStatus('正在上传图片...', 'loading');

  try {
    // 上传所有图片
    const imagePaths = [];
    for (let i = 0; i < selectedImages.length; i++) {
      setStatus(`正在上传图片 ${i+1}/${selectedImages.length}...`, 'loading');
      const path = await uploadImageToGitHub(selectedImages[i].dataUrl, selectedImages[i].name);
      imagePaths.push(path);
    }

    // 生成产品数据
    const product = {
      id: Date.now(),
      title_zh,
      title_en: document.getElementById('title_en').value.trim(),
      category,
      dimensions: document.getElementById('dimensions').value.trim(),
      material: document.getElementById('material').value.trim(),
      fabric: document.getElementById('fabric').value.trim(),
      color: document.getElementById('color').value.trim(),
      sku: document.getElementById('sku').value.trim(),
      desc_zh: document.getElementById('desc_zh').value.trim(),
      desc_en: document.getElementById('desc_en').value.trim(),
      images: imagePaths,
      main_image: imagePaths[0],
      created_at: new Date().toISOString()
    };

    setStatus('正在保存产品数据...', 'loading');

    // 先获取现有产品数据
    let existingProducts = [];
    let existingSha = null;
    const dataPath = 'admin/products/products.json';

    try {
      const getRes = await fetch(`https://api.github.com/repos/${REPO}/contents/${dataPath}`, {
        headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
      });
      if (getRes.ok) {
        const getData = await getRes.json();
        existingSha = getData.sha;
        try {
          const raw = atob(getData.content.replace(/[\r\n\s]/g,''));
          existingProducts = JSON.parse(decodeURIComponent(escape(raw)));
        } catch(e2) {
          // 兼容旧格式
          existingProducts = JSON.parse(atob(getData.content.replace(/[\r\n\s]/g,'')));
        }
      }
    } catch(e) {}

    existingProducts.push(product);

    // 保存产品数据
    const saveBody = {
      message: `Add product: ${title_zh}`,
      content: btoa(unescape(encodeURIComponent(JSON.stringify(existingProducts, null, 2)))),
      branch: BRANCH
    };
    if (existingSha) saveBody.sha = existingSha;

    const saveRes = await fetch(`https://api.github.com/repos/${REPO}/contents/${dataPath}`, {
      method: 'PUT',
      headers: {
        'Authorization': `token ${GITHUB_TOKEN}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(saveBody)
    });

    if (!saveRes.ok) {
      const err = await saveRes.json();
      throw new Error(err.message);
    }

    setStatus(`✅ 产品"${title_zh}"发布成功！网站将在1-2分钟后自动更新。`, 'success');
    resetForm();

  } catch(e) {
    setStatus('❌ 发布失败：' + e.message, 'error');
  } finally {
    btn.disabled = false;
  }
}

function resetForm() {
  ['title_zh','title_en','dimensions','material','fabric','color','sku','desc_zh','desc_en'].forEach(id => {
    document.getElementById(id).value = '';
  });
  selectedImages = [];
  renderPreviews();
}

async function loadProducts() {
  const listEl = document.getElementById('productList');
  try {
    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/admin/products/products.json`, {
      headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
    });
    if (!res.ok) { listEl.innerHTML = '<p style="color:#888;font-size:14px">还没有产品，去添加第一个吧！</p>'; return; }
    const data = await res.json();
    const products = JSON.parse(atob(data.content));
    const catMap = { restaurant:'餐厅家具', hotel:'酒店家具', cafe:'咖啡厅家具', outdoor:'户外家具' };
    listEl.innerHTML = products.length === 0
      ? '<p style="color:#888;font-size:14px">还没有产品，去添加第一个吧！</p>'
      : '<div class="product-list">' + products.slice().reverse().map(p => `
        <div class="product-item">
          <img src="https://raw.githubusercontent.com/${REPO}/${BRANCH}${p.main_image}" onerror="this.src='https://via.placeholder.com/60'"/>
          <div class="product-info">
            <h3>${p.title_zh} ${p.title_en ? '/ '+p.title_en : ''}</h3>
            <p>${p.dimensions||''} ${p.material||''} ${p.fabric||''}</p>
            <span class="badge">${catMap[p.category]||p.category}</span>
          </div>
          <div style="font-size:12px;color:#bbb">${new Date(p.created_at).toLocaleDateString('zh')}</div>
        </div>
      `).join('') + '</div>';
  } catch(e) {
    listEl.innerHTML = '<p style="color:#c00;font-size:14px">加载失败：' + e.message + '</p>';
  }
}
</script>
</body>
</html>

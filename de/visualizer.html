<style>
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#0f1b30;display:flex;flex-direction:column;height:100vh;height:100dvh}
  a{color:inherit}
  /* —— 与官网统一的页头(components.js 注入内部，下面是其所需的工具类垫片) —— */
  header.site-header{flex:0 0 auto;position:relative;z-index:50;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.06)}
  header.site-header::after{content:"";position:absolute;left:0;right:0;bottom:0;height:2px;background:linear-gradient(90deg,transparent,#c8a45c 50%,transparent)}
  .max-w-7xl{max-width:80rem}.mx-auto{margin-left:auto;margin-right:auto}
  .px-4{padding-left:1rem;padding-right:1rem}
  .flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}
  .h-28{height:7rem}.gap-3{gap:.75rem}.gap-8{gap:2rem}
  .hidden{display:none}
  .text-sm{font-size:.875rem;line-height:1.25rem}.font-medium{font-weight:500}
  .text-neutral-700{color:#374151}.transition-colors{transition:color .2s ease}
  .p-2{padding:.5rem}.w-6{width:1.5rem}.h-6{height:1.5rem}
  .hover\:text-accent:hover{color:#c8a45c}
  @media(min-width:640px){.sm\:px-6{padding-left:1.5rem;padding-right:1.5rem}}
  @media(min-width:768px){.md\:flex{display:flex}.md\:hidden{display:none}}
  @media(min-width:1024px){.lg\:px-8{padding-left:2rem;padding-right:2rem}}
  /* 工具区 */
  .stage{flex:1 1 auto;position:relative;background:#0f1b30;min-height:0}
  iframe{width:100%;height:100%;border:0;display:block;position:relative;z-index:1}
  /* 加载态 */
  .loading{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:#0f1b30;color:#cdd7e6;transition:opacity .5s ease}
  .loading.hide{opacity:0;pointer-events:none}
  .spin{width:46px;height:46px;border-radius:50%;border:3px solid rgba(200,164,92,.25);border-top-color:#c8a45c;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading p{margin:0;font-size:14px;letter-spacing:.02em;color:#9fb0c8}
</style>
</head>
<body>
  <header class="site-header"></header>
  <div class="stage">
    <div class="loading" id="ld"><div class="spin"></div><p>
      
      
      
      
      <span data-lang="de">KI-Vorschau wird geladen…</span>
      
    </p></div>
    <iframe id="fr" title="AI 看效果" allow="clipboard-write; camera" loading="eager"></iframe>
  </div>
<script>
(function(){
  var lang=(location.pathname.match(/^\/(zh|en|fr|es|de|ar)(\/|$)/)||[])[1]
         ||(localStorage.getItem('easen-lang'))
         ||((navigator.language||'').slice(0,2))||'zh';
  if(['zh','en','fr','es','de','ar'].indexOf(lang)<0)lang='en';
  // 透传所有 URL 参数给内嵌工具（lang + 未来的 product/cart 等），并补上 lang
  var q=new URLSearchParams(location.search);
  q.set('lang',lang);
  var f=document.getElementById('fr');
  f.src='https://easen-crm.galelikestofuck262626.workers.dev/visualizer?'+q.toString();
  function hide(){var l=document.getElementById('ld');if(l)l.classList.add('hide');}
  f.addEventListener('load',hide);
  setTimeout(hide,8000);
})();
</script>
<script src="/js/lang.js"></script>
<script src="/js/components.js"></script>
</body>
</html>
